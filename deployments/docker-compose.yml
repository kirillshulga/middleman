version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sync-postgres
    environment:
      POSTGRES_USER: sync_user
      POSTGRES_PASSWORD: sync_pass
      POSTGRES_DB: sync_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: